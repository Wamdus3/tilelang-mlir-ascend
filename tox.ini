[tox]
envlist = py311,py312
isolated_build = True

[testenv:py{311,312}]
deps =
    wheel
    build
commands =
    python -m build --wheel -o {toxinidir}/dist


[testenv:py{311,312}-pypi]
setenv =
    PYPI_BUILD = TRUE
commands =
    python setup.py bdist_wheel

[testenv:audit_2_27]
skip_install = true
allowlist_externals =
    bash
deps =
    auditwheel
    patchelf
commands =
    bash -c 'auditwheel repair -L=/lib --exclude=/usr/local/cuda* --exclude=libcuda.so.1 --plat=manylinux_2_27_x86_64 dist/*'

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12
